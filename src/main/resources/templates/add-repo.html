<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Add Repository</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-2xl mx-auto">
        <h2 class="text-2xl font-bold text-gray-900 mb-6">Add Repository</h2>

        <div class="bg-white shadow rounded-lg p-6">
            <form th:action="@{/add-repo}" th:object="${addRepoForm}" method="post">
                <div class="mb-6">
                    <label for="repoUrl" class="block text-sm font-medium text-gray-700 mb-1">
                        GitHub Repository URL
                    </label>
                    <input type="url"
                           id="repoUrl"
                           th:field="*{repoUrl}"
                           placeholder="https://github.com/owner/repository"
                           class="block w-full rounded-md border px-3 py-2 text-gray-900 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                           th:classappend="${#fields.hasErrors('repoUrl')} ? 'border-red-500' : 'border-gray-300'"/>
                    <p th:if="${#fields.hasErrors('repoUrl')}"
                       th:errors="*{repoUrl}"
                       class="mt-1 text-sm text-red-600"></p>
                </div>

                <div class="flex items-center gap-3">
                    <button type="submit"
                            class="inline-flex items-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <i class="fas fa-code-branch mr-2"></i> Clone Repository
                    </button>
                    <a th:href="@{/}" class="text-sm text-gray-600 hover:text-gray-900">Cancel</a>
                </div>
            </form>
        </div>

        <p class="mt-4 text-sm text-gray-500">
            The repository will be cloned to <code class="bg-gray-100 px-1 rounded">~/ttr/</code> on this machine.
        </p>
    </div>
</div>
</body>
</html>
