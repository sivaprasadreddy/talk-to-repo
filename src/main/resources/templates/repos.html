<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Repositories</title>
</head>
<body>
<div layout:fragment="content">

    <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold text-gray-900">Repositories</h2>
        <a th:href="@{/add-repo}"
           class="inline-flex items-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
            <i class="fas fa-plus mr-2"></i> Add Repo
        </a>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(repos)}"
         class="flex flex-col items-center justify-center rounded-lg border-2 border-dashed border-gray-300 bg-white py-16 text-center">
        <i class="fas fa-code-branch text-4xl text-gray-300 mb-4"></i>
        <p class="text-lg font-medium text-gray-500">No repositories yet</p>
        <p class="mt-1 text-sm text-gray-400">Add a repository to get started.</p>
        <a th:href="@{/add-repo}"
           class="mt-4 inline-flex items-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
            <i class="fas fa-plus mr-2"></i> Add Your First Repo
        </a>
    </div>

    <!-- Grid -->
    <div th:unless="${#lists.isEmpty(repos)}"
         class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">

        <a th:each="repo : ${repos}"
           th:href="@{/explore-repo/{id}(id=${repo.id})}"
           class="group block rounded-lg border border-gray-200 bg-white p-6 shadow-sm hover:border-indigo-400 hover:shadow-md transition-all duration-150">

            <div class="flex items-start justify-between mb-3">
                <div class="flex items-center gap-2 min-w-0">
                    <i class="fas fa-code-branch text-indigo-500 flex-shrink-0"></i>
                    <span class="truncate font-semibold text-gray-900 group-hover:text-indigo-600"
                          th:text="${repo.repoName}">owner/repo</span>
                </div>
                <i class="fas fa-arrow-right text-gray-300 group-hover:text-indigo-400 flex-shrink-0 ml-2 transition-colors"></i>
            </div>

            <p class="truncate text-sm text-gray-500 mb-4" th:text="${repo.repoUrl}">
                https://github.com/owner/repo
            </p>

            <div class="flex items-center gap-1 text-xs text-gray-400">
                <i class="fas fa-folder"></i>
                <span class="truncate" th:text="${repo.localPath}"></span>
            </div>

            <div class="mt-3 flex items-center gap-1 text-xs text-gray-400">
                <i class="fas fa-clock"></i>
                <span th:text="${#temporals.format(repo.clonedAt, 'dd MMM yyyy, HH:mm')}"></span>
            </div>
        </a>

    </div>

</div>
</body>
</html>
