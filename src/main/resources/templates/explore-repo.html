<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Explore Repository</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-3xl mx-auto">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold text-gray-900" th:text="${repo.repoName}">Repository Name</h2>
            <a th:href="@{/add-repo}"
               class="inline-flex items-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
                <i class="fas fa-plus mr-2"></i> Add Another
            </a>
        </div>

        <div class="bg-white shadow rounded-lg divide-y divide-gray-200">
            <div class="px-6 py-4 flex items-start gap-4">
                <div class="flex-shrink-0 w-8 text-gray-400 text-center">
                    <i class="fas fa-link"></i>
                </div>
                <div class="min-w-0">
                    <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Repository URL</p>
                    <a th:href="${repo.repoUrl}" th:text="${repo.repoUrl}" target="_blank"
                       class="text-indigo-600 hover:underline break-all"></a>
                </div>
            </div>

            <div class="px-6 py-4 flex items-start gap-4">
                <div class="flex-shrink-0 w-8 text-gray-400 text-center">
                    <i class="fas fa-folder"></i>
                </div>
                <div class="min-w-0">
                    <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Local Path</p>
                    <code class="text-sm text-gray-800 break-all" th:text="${repo.localPath}"></code>
                </div>
            </div>

            <div class="px-6 py-4 flex items-start gap-4">
                <div class="flex-shrink-0 w-8 text-gray-400 text-center">
                    <i class="fas fa-clock"></i>
                </div>
                <div>
                    <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Cloned At</p>
                    <p class="text-sm text-gray-800"
                       th:text="${#temporals.format(repo.clonedAt, 'dd MMM yyyy, HH:mm:ss')}"></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
