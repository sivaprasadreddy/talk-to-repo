<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Explore Repository</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-6 gap-3 flex-wrap">
            <h2 class="text-2xl font-bold text-gray-900" th:text="${repo.repoName}">Repository Name</h2>
            <div class="flex items-center gap-2 flex-wrap">
                <form th:action="@{/repos/{id}/pull(id=${repo.id})}" method="post" class="inline">
                    <button type="submit"
                            class="inline-flex items-center rounded-md bg-sky-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-sky-500">
                        <i class="fas fa-sync-alt mr-2"></i> Refresh
                    </button>
                </form>
                <form th:action="@{/repos/{id}/reingest(id=${repo.id})}" method="post" class="inline">
                    <button type="submit"
                            class="inline-flex items-center rounded-md bg-amber-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-amber-500">
                        <i class="fas fa-redo mr-2"></i> Re-ingest
                    </button>
                </form>
                <form th:action="@{/repos/{id}/generate-readme(id=${repo.id})}" method="post" class="inline">
                    <button type="submit"
                            class="inline-flex items-center rounded-md bg-emerald-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-emerald-500">
                        <i class="fas fa-file-alt mr-2"></i> Generate README
                    </button>
                </form>
                <a th:href="@{/add-repo}"
                   class="inline-flex items-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
                    <i class="fas fa-plus mr-2"></i> Add Another
                </a>
            </div>
        </div>

        <div class="bg-white shadow rounded-lg divide-y divide-gray-200">
            <div class="px-6 py-4 flex items-start gap-4">
                <div class="flex-shrink-0 w-8 text-gray-400 text-center">
                    <i class="fas fa-link"></i>
                </div>
                <div class="min-w-0">
                    <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Repository URL</p>
                    <a th:href="${repo.repoUrl}" th:text="${repo.repoUrl}" target="_blank"
                       class="text-indigo-600 hover:underline break-all"></a>
                </div>
            </div>

            <div class="px-6 py-4 flex items-start gap-4">
                <div class="flex-shrink-0 w-8 text-gray-400 text-center">
                    <i class="fas fa-folder"></i>
                </div>
                <div class="min-w-0">
                    <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Local Path</p>
                    <code class="text-sm text-gray-800 break-all" th:text="${repo.localPath}"></code>
                </div>
            </div>

            <div class="px-6 py-4 flex items-start gap-4">
                <div class="flex-shrink-0 w-8 text-gray-400 text-center">
                    <i class="fas fa-clock"></i>
                </div>
                <div>
                    <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Cloned At</p>
                    <p class="text-sm text-gray-800"
                       th:text="${#temporals.format(repo.clonedAt, 'dd MMM yyyy, HH:mm:ss')}"></p>
                </div>
            </div>

            <div th:if="${repo.ingestedAt != null}" class="px-6 py-4 flex items-start gap-4">
                <div class="flex-shrink-0 w-8 text-gray-400 text-center">
                    <i class="fas fa-database"></i>
                </div>
                <div>
                    <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Indexed At</p>
                    <p class="text-sm text-gray-800"
                       th:text="${#temporals.format(repo.ingestedAt, 'dd MMM yyyy, HH:mm:ss')}"></p>
                </div>
            </div>
        </div>

        <details th:if="${repo.generatedReadme != null}" class="mt-6 bg-white shadow rounded-lg group" open>
            <summary class="px-6 py-4 cursor-pointer list-none flex items-center gap-2 select-none">
                <i class="fas fa-file-alt text-emerald-500"></i>
                <span class="font-semibold text-gray-700">Generated README</span>
                <i class="fas fa-chevron-down ml-auto text-gray-400 details-chevron transition-transform duration-200"></i>
            </summary>
            <div class="px-8 pb-8 border-t border-gray-100">
                <div id="raw-readme" class="hidden" th:text="${repo.generatedReadme}"></div>
                <div id="readme-content" class="prose prose-slate max-w-none pt-4"></div>
            </div>
        </details>
    </div>
</div>
<th:block layout:fragment="page-scripts">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const raw = document.getElementById('raw-readme');
            const target = document.getElementById('readme-content');
            if (raw && target) {
                target.innerHTML = marked.parse(raw.textContent);
            }
        });
    </script>
</th:block>
</body>
</html>
